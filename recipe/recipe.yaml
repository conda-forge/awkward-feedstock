schema_version: 1

context:
  version: "2.10.0"

package:
  name: awkward
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/awkward/awkward-${{ version }}.tar.gz
  sha256: d297f8aee0263c1fd3d8ae25a61155169322298357368ffadcc6f17d9f70f38d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling >1.10.0
    - hatch-fancy-pypi-readme
  run:
    - python >=${{ python_min }}
    - awkward-cpp ==54
    - importlib-metadata >=4.13.0
    - numpy >=1.18.0
    - packaging
    - typing_extensions >=4.1.0
    - fsspec >=2022.11.0

tests:
  - python:
      imports:
        - awkward
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Manipulate JSON-like data with NumPy-like idioms.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/scikit-hep/awkward
  repository: https://github.com/scikit-hep/awkward
  documentation: https://awkward-array.org/doc/main/

extra:
  recipe-maintainers:
    - TaiSakuma
    - lgray
    - chrisburr
    - jpivarski
    - henryiii
    - agoose77
    - conda-forge/scikit-hep
    - ioanaif
    - ianna
